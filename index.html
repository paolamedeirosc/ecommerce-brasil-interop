<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>E-commerce Brasil - Interoperabilidade</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        #vitrine { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .produto { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .produto img { max-width: 100%; height: 150px; object-fit: contain; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Vitrine de Produtos - Processamento Assíncrono (XHR)</h1>
    <button id="btnCarregar">Carregar Produtos via API</button>
    <div id="vitrine"></div>
    <script src="script.js"></script>
</body>
</html>
